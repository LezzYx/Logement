name: Crous Watcher

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes
  workflow_dispatch: {}      # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write            # nécessaire pour committer le fichier d'état

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run watcher
        id: run-watcher
        env:
          SEARCH_URL: ${{ secrets.SEARCH_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python crous_watcher.py
        continue-on-error: true   # on committe l'état même si ce cycle a échoué

      - name: Commit updated state files
        run: |
          git config user.name "crous-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json status.json
          git diff --quiet --cached || git commit -m "update state"
          git push

      - name: Fail the job if the watcher failed
        if: steps.run-watcher.outcome == 'failure'
        run: exit 1
